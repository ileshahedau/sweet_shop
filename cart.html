<!DOCTYPE html>
<html>
<head>
<title>Cart & Billing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="text-center">Your Cart 🛒</h2>

<table class="table table-bordered">
<thead>
<tr>
<th>Item</th>
<th>Price (₹)</th>
<th>Action</th>
</tr>
</thead>

<tbody id="cartItems"></tbody>
</table>

<h3 id="total">Total: ₹0</h3>

<button class="btn btn-danger" onclick="clearCart()">Clear Cart</button>

<hr>

<h4>Billing Details</h4>

<input type="text" id="name" placeholder="Enter Name" class="form-control mb-2">
<input type="text" id="address" placeholder="Enter Address" class="form-control mb-2">
<input type="text" id="phone" placeholder="Enter Phone" class="form-control mb-2">

<button class="btn btn-success" onclick="placeOrder()">Place Order</button>

<br><br>
<a href="index.html" class="btn btn-secondary">Back to Shop</a>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayCart(){
let output = "";
let total = 0;

cart.forEach((item,index)=>{
output += `
<tr>
<td>${item.name}</td>
<td>₹${item.price}</td>
<td><button onclick="removeItem(${index})" class="btn btn-sm btn-danger">Remove</button></td>
</tr>
`;
total += item.price;
});

document.getElementById("cartItems").innerHTML = output;
document.getElementById("total").innerText = "Total: ₹" + total;
}

function removeItem(index){
cart.splice(index,1);
localStorage.setItem("cart", JSON.stringify(cart));
displayCart();
}

function clearCart(){
cart = [];
localStorage.setItem("cart", JSON.stringify(cart));
displayCart();
}

function placeOrder(){
let name = document.getElementById("name").value;

if(name === ""){
alert("Please enter your name!");
return;
}

alert("🎉 Order Placed Successfully!");
clearCart();
}

displayCart();
</script>

</body>
</html>
